# =============================================================================
# CI — runs on every push and PR to validate the build
#
# Jobs:
#   build-test-linux  — Linux build+test via scripts/run-on-linux.sh (Ubuntu container)
#   build-macos       — macOS build+test with Metal (Apple Silicon, GitHub-hosted)
#   lint-workflows    — validate all workflow YAML files
#   guard-features    — prevent modifications to backlog/ and closed/ feature folders
# =============================================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt in ahead of June 2026 forced migration

jobs:
  # --- Linux: CPU-only build inside Ubuntu 22.04 container ---
  build-test-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # All build/test/package logic lives in the script for reuse
      - name: Build and test
        run: ./scripts/run-on-linux.sh

      - uses: actions/upload-artifact@v4
        if: always()  # Upload test report even on failure
        with:
          name: test-report-linux
          path: test-report.xml

  # --- macOS: Metal-enabled build on Apple Silicon ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Metal)
        run: |
          cmake -B build \
            -DGGML_METAL=ON \
            -DLLAMA_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Verify Metal shader compiled
        run: |
          test -f build/bin/ggml-metal.metal || echo "WARNING: Metal shader not found"

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # --- Lint: catch YAML syntax errors in workflow files ---
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          pip install pyyaml
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f')); print(f'OK: $f')" || exit 1
          done

  # --- Guard: protect feature folder structure ---
  guard-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce feature folder immutability
        run: |
          # backlog/ and closed/ are read-only — fail if modified in this PR
          git diff --name-only origin/main...HEAD | grep -E "^features/(backlog|closed)/" && \
            echo "ERROR: backlog/ and closed/ are read-only. Move files via sprint process only." && exit 1 || \
            echo "Feature folder integrity OK"
