# =============================================================================
# CI — runs on every push and PR to validate the build
#
# Jobs:
#   build-test-linux  — Linux build+test via scripts/run-on-linux.sh
#   build-macos       — macOS build+test with Metal (Apple Silicon, GitHub-hosted)
#   lint-workflows    — validate all workflow YAML files
#   guard-features    — prevent modifications to backlog/ and closed/ feature folders
#   guard-thresholds  — block PRs that relax test thresholds without justification
# =============================================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt in ahead of June 2026 forced migration

jobs:
  # --- Linux: CPU-only build on ubuntu-latest (no container needed) ---
  build-test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # All build/test/package logic lives in the script for reuse
      - name: Build and test
        run: ./scripts/run-on-linux.sh

      - uses: actions/upload-artifact@v4
        if: always()  # Upload test report even on failure
        with:
          name: test-report-linux
          path: test-report.xml

  # --- macOS: Metal-enabled build on Apple Silicon ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Metal)
        run: |
          cmake -B build -S llama.cpp \
            -DGGML_METAL=ON \
            -DLLAMA_BUILD_TESTS=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Verify Metal shader compiled
        run: |
          test -f build/bin/ggml-metal.metal || echo "WARNING: Metal shader not found"

      - name: Test
        run: timeout 300 ctest --test-dir build --output-on-failure || true

  # --- Lint: catch YAML syntax errors in workflow files ---
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workflow YAML syntax
        run: |
          pip install pyyaml
          for f in .github/workflows/*.yml; do
            python3 -c "import yaml, sys; yaml.safe_load(open('$f')); print(f'OK: $f')" || exit 1
          done

  # --- Guard: protect feature folder structure ---
  guard-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce feature folder immutability
        run: |
          # backlog/ and closed/ are read-only — fail if modified in this PR
          git diff --name-only origin/main...HEAD | grep -E "^features/(backlog|closed)/" && \
            echo "ERROR: backlog/ and closed/ are read-only. Move files via sprint process only." && exit 1 || \
            echo "Feature folder integrity OK"

  # --- Guard: block threshold relaxation without justification ---
  guard-thresholds:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for threshold relaxation
        run: |
          # Detect if thresholds.json was modified in this PR
          if git diff origin/main...HEAD --name-only | grep -q "tests/thresholds.json"; then
            echo "WARNING: tests/thresholds.json was modified in this PR"

            # Check if any numeric value increased (relaxed)
            python3 -c "
          import json, subprocess, sys

          old = subprocess.run(['git', 'show', 'origin/main:tests/thresholds.json'],
                               capture_output=True, text=True)
          if old.returncode != 0:
              print('thresholds.json is new — no baseline to compare')
              sys.exit(0)

          old_data = json.loads(old.stdout)
          new_data = json.load(open('tests/thresholds.json'))

          def check(old_d, new_d, path=''):
              for key in new_d:
                  if key.startswith('_'):
                      continue
                  full = f'{path}.{key}' if path else key
                  if isinstance(new_d[key], dict):
                      check(old_d.get(key, {}), new_d[key], full)
                  elif isinstance(new_d[key], (int, float)):
                      old_val = old_d.get(key)
                      if old_val is not None:
                          # For 'min_*' thresholds, decreasing = relaxing
                          # For 'max_*' thresholds, increasing = relaxing
                          if key.startswith('min_') and new_d[key] < old_val:
                              print(f'RELAXED: {full}: {old_val} -> {new_d[key]}')
                              return True
                          if key.startswith('max_') and new_d[key] > old_val:
                              print(f'RELAXED: {full}: {old_val} -> {new_d[key]}')
                              return True
              return False

          if check(old_data, new_data):
              print()
              print('ERROR: Threshold relaxation detected.')
              print('Include benchmark data in the PR description to justify this change.')
              sys.exit(1)
          else:
              print('Thresholds OK — no relaxation detected')
          "
          else
            echo "thresholds.json unchanged — OK"
          fi
