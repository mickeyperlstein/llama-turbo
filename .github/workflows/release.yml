# =============================================================================
# Release — creates a GitHub Release with build artifacts on merge to main
#
# Jobs:
#   build-linux  — Linux build via scripts/run-on-linux.sh, produces tarball + test report
#   build-macos  — macOS Metal build, produces tarball + test report
#   release      — collects artifacts and publishes a GitHub Release
# =============================================================================
name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt in ahead of June 2026 forced migration

jobs:
  # --- Linux: CPU-only build on ubuntu-latest (no container needed) ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # All build/test/package logic lives in the script for reuse
      - name: Build, test, and package
        run: ./scripts/run-on-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            llama-turbo-linux-x86_64.tar.gz
            test-report.xml

  # --- macOS: Metal-enabled build on Apple Silicon ---
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build (Metal)
        run: |
          cmake -B build -DGGML_METAL=ON -DLLAMA_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure --output-junit test-report-macos.xml

      - name: Package artifacts
        run: |
          mkdir -p staging
          # Copy libraries
          cp -a build/bin/*.dylib staging/ 2>/dev/null || true
          cp -a build/bin/*.so staging/ 2>/dev/null || true
          cp -a build/bin/*.metal staging/ 2>/dev/null || true
          # Copy test executables
          for f in build/bin/test-*; do
            [ -x "$f" ] && cp "$f" staging/
          done
          # Copy CTestTestfile so ctest --test-dir works on the extracted archive
          cp build/CTestTestfile.cmake staging/ 2>/dev/null || true
          cp -r build/tests staging/tests 2>/dev/null || true
          tar -czf llama-turbo-macos-arm64.tar.gz -C staging .

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            llama-turbo-macos-arm64.tar.gz
            test-report-macos.xml

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          body: |
            Automated build from commit ${{ github.sha }}

            ## Artifacts
            - `llama-turbo-linux-x86_64.tar.gz` — Linux x86_64 binaries
            - `llama-turbo-macos-arm64.tar.gz` — macOS ARM64 Metal build
            - `test-report.xml` — ctest results (Linux)
            - `test-report-macos.xml` — ctest results (macOS)
          files: |
            llama-turbo-linux-x86_64.tar.gz
            llama-turbo-macos-arm64.tar.gz
            test-report.xml
            test-report-macos.xml
          make_latest: true
