name: Sync Upstream llama.cpp

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mickeyperlstein/llama.cpp
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ggml-org/llama.cpp || true
          git fetch upstream

      - name: Create sync branch
        run: |
          git checkout -b sync/upstream-$(date +%Y%m%d)
          git merge upstream/master --no-edit || true

      - name: Push and open PR
        run: |
          git push origin sync/upstream-$(date +%Y%m%d)
          gh pr create \
            --repo mickeyperlstein/llama.cpp \
            --title "chore: sync upstream ggml-org/llama.cpp $(date +%Y-%m-%d)" \
            --body "Weekly upstream sync. Review for merge conflicts before merging." \
            --base master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
