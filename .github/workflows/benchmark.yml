# =============================================================================
# Benchmark — smoke inference test on Apple Silicon
#
# Triggered manually (workflow_dispatch) or on merge to main.
# Runs on macos-latest (self-hosted apple-silicon runner when available).
# Downloads a tiny model, generates 10 tokens, and outputs smoke.json.
#
# Per sprint0_devops.feature:
#   - Runs a 10-token smoke generation with a small test model
#   - Outputs benchmark/results/smoke.json artifact
#   - Fails if the smoke generation produces no output
# =============================================================================
name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-benchmark:
    # Use self-hosted apple-silicon runner if available, fall back to macos-latest
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Build llama.cpp with Metal support + examples (llama-cli, llama-completion)
      - name: Build (Metal)
        run: |
          cmake -B build -S llama.cpp \
            -DGGML_METAL=ON \
            -DLLAMA_BUILD_TESTS=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(sysctl -n hw.logicalcpu)

      # Verify inference binary was built
      - name: Verify build
        run: |
          test -x build/bin/llama-completion || test -x build/bin/llama-cli || { echo "FAIL: no inference binary built"; exit 1; }
          ls -la build/bin/llama-completion build/bin/llama-cli 2>/dev/null || true

      # Run the smoke inference test — downloads tiny model, generates 10 tokens
      - name: Smoke inference test
        run: ./scripts/smoke-test.sh --build-dir build/bin

      # Validate smoke.json was produced and has "passed": true
      - name: Validate smoke results
        run: |
          test -f benchmark/results/smoke.json || { echo "FAIL: smoke.json not produced"; exit 1; }
          python3 -c "
          import json, sys
          data = json.load(open('benchmark/results/smoke.json'))
          assert data['passed'], 'Smoke test did not pass'
          assert data['output_words'] > 0, 'No output generated'
          print(f'Smoke OK: {data[\"output_words\"]} words in {data[\"elapsed_ms\"]}ms')
          " || { echo "FAIL: smoke.json validation failed"; exit 1; }

      # Copy smoke results to benchmark-results (for release packaging)
      - name: Export benchmark results
        run: cp benchmark/results/smoke.json benchmark/results/benchmark-results.json

      # Upload both smoke.json and benchmark-results.json as artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark/results/smoke.json
            benchmark/results/benchmark-results.json
